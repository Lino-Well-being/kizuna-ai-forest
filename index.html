const ITER = 600000;
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryOpen(pw, silent) {
  const raw = b64(PAYLOAD);
  const salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
  try {
    const keyMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" },
      keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    if (document.getElementById("remember").checked) localStorage.setItem("kuma_aikotoba", pw);
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  } catch (e) {
    if (!silent) document.getElementById("err").textContent = "あいことばが違うようです。もう一度どうぞ。";
    localStorage.removeItem("kuma_aikotoba");
  }
}
document.getElementById("go").addEventListener("click", () => tryOpen(document.getElementById("pw").value.trim(), false));
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") tryOpen(e.target.value.trim(), false); });
const saved = localStorage.getItem("kuma_aikotoba");
if (saved) tryOpen(saved, true);
</script>
